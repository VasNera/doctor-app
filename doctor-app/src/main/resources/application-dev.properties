spring.config.import=optional:application-secret.properties

# Database settings
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:doctorappdb}?useSSL=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:doctorappuser}
spring.datasource.password=${MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# disable first time to generate create tables
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.security.secret-key=${JWT_SECRET_KEY}
app.security.jwt-expiration=10800000

# Mail (Mailtrap SMTP)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAILTRAP_USERNAME}
spring.mail.password=${MAILTRAP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App mail settings
app.mail.from=no-reply@doctorapp.gr
app.activation.base-url=http://localhost:5173/activate


# make sure to use JOIN FETCH
spring.jpa.open-in-view=false

allowed.origins=http://localhost:5173,http://localhost:3000
file.upload.dir=uploads/

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB